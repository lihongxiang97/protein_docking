# PPI Docking 配置文件

preprocessing:
  remove_water: true
  remove_hetatm: true
  remove_ions: true
  add_hydrogens: true
  standardize_names: true
  probe_radius: 1.4  # Å, SASA 探针半径

surface:
  sasa_threshold: 25.0  # Å², 表面残基 SASA 阈值
  neighbor_radius: 8.0  # Å
  neighbor_density_threshold: 0.15

docking:
  search_method: fft
  # DB5.5 strict blind docking needs coverage before fine scoring can help.
  coarse_rotations: 72
  coarse_translations: 5
  translation_step: 5.0  # Å
  mc_iterations: 400
  mc_temperature: 2.0
  contact_distance: 5.0  # Å
  clash_distance: 2.0  # Å
  top_n_poses: 10
  global_candidate_limit: 480
  refine_seeds: 10
  cluster_rmsd: 4.0
  max_clash_fraction: 0.40
  # Keep strict blind benchmarking honest; turn on only for bound-pose sanity checks.
  include_input_pose: false
  input_pose_bonus: 15.0
  input_prior_decay_rmsd: 2.0
  fft_rescore_weight: 5.0
  reranker_model: models/default_pose_reranker.joblib
  # Classifier probabilities are 0-1, so the learned acceptable-pose prior needs scale.
  reranker_weight: 40.0
  random_seed: 42
  grid_search: true
  monte_carlo: true

fft_search:
  grid_spacing: 2.0
  padding: 8.0
  max_grid_size: 128
  top_translations_per_rotation: 12
  min_translation_separation: 4.0
  shell_width: 3.0
  core_penalty: 6.0
  shape_weight: 1.0
  electrostatic_weight: 0.25
  hydrophobic_weight: 0.20

scoring:
  weights:
    hydrophobic: 0.15
    electrostatic: 0.25
    contacts: 0.25
    interface_area: 0.15
    clash_penalty: 0.90
    restraints: 0.45
  contact_cutoff: 5.0
  residue_contact_cutoff: 8.0
  hbond_distance: 3.5
  hbond_bonus: 0.5
  max_hbond_bonus_count: 30
  hydrophobic_residues:
    - ALA
    - VAL
    - LEU
    - ILE
    - MET
    - PHE
    - TRP
    - PRO

ppi_prediction:
  interaction_threshold: 0.5
  min_interface_area: 400.0  # Å²
  min_contact_residues: 8
  model_type: random_forest

restraints:
  enabled: false
  receptor_active: []
  ligand_active: []
  target_distance: 6.0
  upper_distance: 10.0

evaluation:
  positive_pairs: 15
  negative_pairs: 8
  contact_cutoff: 5.0
  fnat_cutoff: 5.0

output:
  results_dir: results
  save_poses: true
  generate_plots: true
  generate_report: true
